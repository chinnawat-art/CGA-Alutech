<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการสมาชิกและสิทธิ์</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
    <script src="auth.js?v=20260714-4"></script>
  <link rel="stylesheet" href="theme.css">
  <script src="theme.js" defer></script>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:'Kanit',sans-serif; color:var(--text); background:var(--bg-body); }
    .page { width:min(1440px,calc(100% - 32px)); margin:auto; padding:24px 0 60px; }
    .hero,.panel { background:var(--bg-card); border:1px solid var(--border); border-radius:22px; box-shadow:0 16px 50px rgba(0,0,0,.16); }
    .hero { padding:24px 28px; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; }
    .hero-main { display:flex; align-items:center; gap:16px; }
    .hero-icon { width:58px; height:58px; border-radius:17px; display:grid; place-items:center; font-size:28px; background:linear-gradient(145deg,#0ea5e9,#14b8a6); }
    h1,h2,p { margin:0; } h1 { font-size:1.8rem; } .muted { color:var(--muted); }
    .nav { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .btn { border:1px solid var(--border); border-radius:11px; padding:10px 16px; font:inherit; font-weight:600; cursor:pointer; color:var(--text); background:var(--input-bg); text-decoration:none; }
    .btn-primary { color:white; border:0; background:linear-gradient(135deg,#0284c7,#0d9488); }
    .btn-danger { color:#f87171; border-color:rgba(248,113,113,.35); }
    .grid { display:grid; grid-template-columns:minmax(340px,430px) minmax(0,1fr); gap:20px; margin-top:20px; align-items:start; }
    .panel { padding:22px; } .panel-title { margin-bottom:18px; }
    .field { display:grid; gap:7px; margin-bottom:14px; } label { font-size:.88rem; font-weight:600; }
    input,select { width:100%; border:1px solid var(--border); border-radius:11px; padding:11px 13px; font:inherit; color:var(--text); background:var(--input-bg); }
    input:focus,select:focus { outline:0; border-color:#0ea5e9; box-shadow:0 0 0 3px rgba(14,165,233,.13); }
    .permissions { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
    .permission { display:flex; gap:9px; align-items:center; padding:9px 10px; border:1px solid var(--border); border-radius:10px; cursor:pointer; background:rgba(148,163,184,.04); }
    .permission input { width:17px; height:17px; }
    .permission.action-permission { border-color:rgba(245,158,11,.38); background:rgba(245,158,11,.08); }
    .permission.action-permission span { color:#fbbf24; font-weight:700; }
    .permission.data-permission { border-color:rgba(20,184,166,.38); background:rgba(20,184,166,.08); }
    .permission.data-permission span { color:#2dd4bf; font-weight:700; }
    .form-actions { display:flex; gap:10px; margin-top:18px; } .form-actions .btn-primary { flex:1; }
    .status { display:none; margin-top:14px; padding:11px 13px; border-radius:10px; }
    .status.show { display:block; } .status.success { color:#34d399; background:rgba(16,185,129,.12); } .status.error { color:#f87171; background:rgba(239,68,68,.12); } .status.warning { color:#fbbf24; background:rgba(245,158,11,.12); }
    .member-list { display:grid; gap:12px; max-height:72vh; overflow:auto; padding-right:4px; }
    .member-search { display:flex; gap:10px; align-items:center; margin-bottom:14px; }
    .member-search input { flex:1; }
    .member-count { color:var(--muted); font-size:.85rem; white-space:nowrap; }
    .member { border:1px solid var(--border); border-radius:15px; padding:15px; background:rgba(148,163,184,.035); }
    .member-head { display:flex; justify-content:space-between; gap:12px; align-items:start; }
    .member-email { font-weight:600; word-break:break-all; } .role { padding:4px 10px; border-radius:99px; color:#67e8f9; background:rgba(6,182,212,.13); font-size:.8rem; }
    .member-permissions { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:7px; margin-top:12px; }
    .member-actions { display:flex; justify-content:flex-end; margin-top:12px; }
    .member-actions { gap:8px; }
    .btn-delete { color:#f87171; border-color:rgba(248,113,113,.4); background:rgba(239,68,68,.08); }
    .btn-delete:hover { background:rgba(239,68,68,.16); }
    .loading { padding:40px; text-align:center; color:var(--muted); }
    @media(max-width:960px){.grid{grid-template-columns:1fr}.member-list{max-height:none}}
    @media(max-width:640px){.page{width:min(100% - 20px,1440px);padding-top:10px}.permissions,.member-permissions{grid-template-columns:1fr}.hero,.panel{padding:17px}}
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="hero-main"><div class="hero-icon">🔐</div><div><h1>จัดการสมาชิกและสิทธิ์</h1><p class="muted">สำหรับ CEO เพิ่มผู้ใช้งาน กำหนดหน้าที่เข้าถึง และสิทธิ์ใช้ปุ่มคำสั่ง</p></div></div>
      <div class="nav"><a href="index.html" class="btn">← หน้าหลัก</a><div id="user-display-area"></div><button class="btn btn-danger" onclick="auth.logout()">ออกจากระบบ</button></div>
    </header>

    <section class="grid">
      <form id="createUserForm" class="panel" novalidate>
        <div class="panel-title"><h2>เพิ่มสมาชิก</h2><p class="muted">สมาชิกเข้าสู่ระบบด้วย User และ Password ที่กำหนด</p></div>
        <div id="formStatus" class="status"></div>
        <div class="field"><label for="username">User</label><input id="username" required minlength="3" autocomplete="off" placeholder="เช่น production01"></div>
        <div class="field"><label for="password">Password <span id="passwordCount" class="muted">(0/8)</span></label><input id="password" type="password" required minlength="8" autocomplete="new-password" placeholder="อย่างน้อย 8 ตัวอักษร"></div>
        <div class="field"><label for="fullName">ชื่อที่แสดง</label><input id="fullName" placeholder="ชื่อพนักงาน"></div>
        <div class="field"><label for="role">บทบาท</label><select id="role"><option value="pdtPerson">ฝ่ายผลิต</option><option value="APRD">ฝ่ายจัดเตรียม/สต็อก</option><option value="Admin">Admin</option><option value="Ceo">CEO</option></select></div>
        <div class="field"><label>สิทธิ์เข้าถึงหน้า ข้อมูล และปุ่มคำสั่ง</label><div id="createPermissions" class="permissions"></div></div>
        <div class="form-actions"><button type="button" class="btn" onclick="toggleAllCreate(true)">เลือกทั้งหมด</button><button class="btn btn-primary" type="submit">เพิ่มสมาชิก</button></div>
      </form>

      <section class="panel">
        <div class="panel-title"><h2>สมาชิกทั้งหมด</h2><p class="muted">แก้ไขสิทธิ์แล้วกดบันทึกในสมาชิกแต่ละคน</p></div>
        <div class="member-search"><input id="memberSearch" type="search" placeholder="ค้นหาชื่อ User อีเมล หรือบทบาท..."><span id="memberCount" class="member-count"></span></div>
        <div id="memberNotice" class="status"></div>
        <div id="memberList" class="member-list"><div class="loading">กำลังโหลดสมาชิก...</div></div>
      </section>
    </section>
  </main>

  <script>
    const db = window.auth.supabase;
    const PAGES = [
      ['index.html','บันทึกออเดอร์'],['dashboard.html','แดชบอร์ดออเดอร์'],['executive_dashboard.html','แดชบอร์ดผู้บริหาร'],
      ['production.html','ฝ่ายผลิต'],['production_history.html','ประวัติการผลิต'],['material_prep.html','จัดเตรียมวัสดุ'],
      ['stock_management.html','จัดการสต็อก'],['backup_stock.html','สต็อกสำรอง'],['sku_manage.html','จัดการ SKU'],
      ['stock_bom_manage.html','จัดการ BOM'],['damage_report.html','วัสดุเสียหาย'],['user_management.html','จัดการสมาชิก']
    ];
    const ACTIONS = [
      ['action_cancel_order','ใช้ปุ่มยกเลิกออเดอร์'],
      ['action_delete_order','ใช้ปุ่มลบออเดอร์'],
      ['action_decrease_stock','ปรับสต็อกลดลง']
    ];
    const DATA_PERMISSIONS = [
      ['data_access_profiles','เข้าถึงข้อมูล Profiles'],
      ['data_view_production_pending','ดูรายการรอผลิต'],
      ['data_view_production_producing','ดูรายการกำลังผลิต']
    ];
    const PERMISSIONS = [
      ...PAGES.map(item => [...item, 'page']),
      ...ACTIONS.map(item => [...item, 'action']),
      ...DATA_PERMISSIONS.map(item => [...item, 'data'])
    ];
    const PAGE_KEYS = new Set(PAGES.map(([key]) => key));
    let users = [];

    const esc = value => String(value ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const permissionBoxes = (prefix, selected = new Set(), lockAll = false) => PERMISSIONS.map(([key,label,type]) => {
      const typeClass = type === 'action' ? 'action-permission' : type === 'data' ? 'data-permission' : '';
      const icon = type === 'action' ? '⚡ ' : type === 'data' ? '🗃️ ' : '';
      return `<label class="permission ${typeClass}"><input type="checkbox" data-permission="${key}" ${selected.has(key)?'checked':''} ${lockAll ? 'disabled' : ''}><span>${icon}${label}</span></label>`;
    }).join('');
    document.getElementById('createPermissions').innerHTML = permissionBoxes('create');

    function showStatus(message, type) { const el=document.getElementById('formStatus'); el.textContent=message; el.className=`status show ${type}`; el.scrollIntoView({behavior:'smooth',block:'center'}); }
    function toggleAllCreate(checked) { document.querySelectorAll('#createPermissions input').forEach(input => input.checked=checked); }
    function selectedPermissions(container) { return [...container.querySelectorAll('input[data-permission]:checked')].map(input => input.dataset.permission); }

    function filterMembers() {
      const query=document.getElementById('memberSearch').value.trim().toLowerCase();
      const cards=[...document.querySelectorAll('#memberList .member')];
      let visible=0;
      cards.forEach(card=>{
        const matched=!query||card.dataset.search.includes(query);
        card.style.display=matched?'':'none';
        if(matched) visible++;
      });
      document.getElementById('memberCount').textContent=query?`${visible}/${cards.length} คน`:`${cards.length} คน`;
    }

    function readableError(value) {
      if (!value) return '';
      if (typeof value === 'string') return value;
      if (value instanceof Error) return value.message || value.name;
      if (typeof value === 'object') {
        const nested=value.error||value.message||value.msg||value.error_description||value.details||value.hint;
        if(nested&&nested!==value) return readableError(nested);
        try { const serialized=JSON.stringify(value); return serialized==='{}'?'':serialized; } catch(_) { return ''; }
      }
      return String(value);
    }

    async function invokeAdmin(action, payload = {}) {
      if (window.location.protocol === 'file:') {
        throw new Error('กรุณาเปิดระบบผ่าน Local Server ไม่ใช่เปิดไฟล์ HTML โดยตรง');
      }
      const { data, error } = await db.functions.invoke('index-ts', { body: { action, ...payload } });
      if (error) {
        let detail = readableError(data) || readableError(error);
        try {
          if (error.context instanceof Response) {
            const response = error.context.clone();
            const responseText = await response.text();
            let responseBody = responseText;
            try { responseBody=JSON.parse(responseText); } catch(_) { /* Keep raw response text. */ }
            detail = readableError(responseBody) || detail || `HTTP ${response.status}`;
          }
        } catch (_) { /* Keep the SDK error when the response is not JSON. */ }
        throw new Error(detail || 'Edge Function ล้มเหลวโดยไม่ส่งรายละเอียด กรุณาตรวจ Logs ของ index-ts');
      }
      if (data?.error) throw new Error(readableError(data.error) || 'Edge Function ส่งข้อผิดพลาดว่างเปล่า');
      return data;
    }

    async function loadMembers() {
      try {
        const [profileResult, permissionResult] = await Promise.all([
          db.from('profiles').select('id,role,full_name'),
          db.from('user_page_permissions').select('user_id,page_key,can_access')
        ]);
        if (profileResult.error) throw profileResult.error;

        let edgeAvailable = window.location.protocol !== 'file:';
        let edgeUsers = [];
        if (edgeAvailable) {
          try {
            const userResult = await invokeAdmin('list');
            edgeUsers = userResult.users || [];
          } catch (edgeError) {
            edgeAvailable = false;
            console.warn('index-ts Edge Function is unavailable:', edgeError);
          }
        }
        if (!edgeAvailable) {
          edgeUsers = (profileResult.data || []).map(profile => ({
            id: profile.id,
            email: '',
            role: profile.role,
            full_name: profile.full_name || '',
          }));
        }

        const notice = document.getElementById('memberNotice');
        if (!edgeAvailable) {
          notice.textContent = window.location.protocol === 'file:'
            ? 'กำลังแสดงข้อมูลจาก profiles: กรุณาเปิดผ่าน run_server.bat แล้วเข้า http://localhost:8000/user_management.html เพื่อเพิ่มสมาชิก'
            : 'แสดงรายชื่อจาก profiles ชั่วคราว: ต้อง Deploy Edge Function index-ts เพื่อดูอีเมลและเพิ่มสมาชิก';
          notice.className = 'status show warning';
        } else {
          notice.className = 'status';
          notice.textContent = '';
        }

        const permissionMap = new Map();
        if (permissionResult.error) console.warn('Unable to load page permissions:', permissionResult.error);
        (permissionResult.data || []).forEach(row => {
          if (!permissionMap.has(row.user_id)) permissionMap.set(row.user_id,new Set());
          if (row.can_access) permissionMap.get(row.user_id).add(row.page_key);
        });
        users = edgeUsers;
        document.getElementById('memberList').innerHTML = users.map(user => {
          const selected=new Set(permissionMap.get(user.id)||[]);
          if(user.role==='Ceo') PERMISSIONS.forEach(([key])=>selected.add(key));
          const secondary = user.email || 'อีเมลจะแสดงหลัง Deploy Edge Function';
          const displayName=esc(user.full_name||user.email||'สมาชิก');
          const searchText=esc(`${user.full_name||''} ${user.email||''} ${user.role||''}`.toLowerCase());
          return `<article class="member" data-user-id="${user.id}" data-search="${searchText}"><div class="member-head"><div><div class="member-email">${displayName}</div><div class="muted">${esc(secondary)}</div></div><span class="role">${esc(user.role||'ไม่ระบุ')}</span></div><div class="member-permissions">${permissionBoxes(user.id,selected,user.role==='Ceo')}</div><div class="member-actions"><button class="btn btn-delete" onclick="deleteUser('${user.id}',this)">ลบสมาชิก</button><button class="btn btn-primary" onclick="savePermissions('${user.id}',this)">บันทึกสิทธิ์</button></div></article>`;
        }).join('') || '<div class="loading">ยังไม่มีสมาชิก</div>';
        filterMembers();
      } catch (error) { document.getElementById('memberList').innerHTML=`<div class="status show error">${esc(error.message)}</div>`; }
    }

    async function savePermissions(userId, button) {
      const card=document.querySelector(`[data-user-id="${userId}"]`); const selected=selectedPermissions(card);
      button.disabled=true; button.textContent='กำลังบันทึก...';
      try {
        const { error }=await db.from('user_page_permissions').upsert(PERMISSIONS.map(([page_key])=>({user_id:userId,page_key,can_access:selected.includes(page_key)})),{onConflict:'user_id,page_key'});if(error)throw error;
        button.textContent='บันทึกแล้ว ✓'; setTimeout(()=>button.textContent='บันทึกสิทธิ์',1600);
      } catch(error){alert('บันทึกไม่สำเร็จ: '+error.message);button.textContent='บันทึกสิทธิ์';} finally{button.disabled=false;}
    }

    async function deleteUser(userId, button) {
      const displayName=button.closest('.member')?.querySelector('.member-email')?.textContent||'สมาชิก';
      if (!confirm(`ยืนยันลบสมาชิก "${displayName}"?\n\nบัญชีนี้จะไม่สามารถเข้าสู่ระบบได้อีก`)) return;
      button.disabled=true;
      const originalText=button.textContent;
      button.textContent='กำลังลบ...';
      try {
        await invokeAdmin('delete',{user_id:userId});
        document.querySelector(`[data-user-id="${userId}"]`)?.remove();
        filterMembers();
        showStatus(`ลบสมาชิก ${displayName} สำเร็จ`,'success');
      } catch(error) {
        showStatus(`ลบสมาชิกไม่สำเร็จ: ${error.message}`,'error');
        button.disabled=false;
        button.textContent=originalText;
      }
    }

    document.getElementById('password').addEventListener('input', event => {
      document.getElementById('passwordCount').textContent = `(${event.target.value.length}/8)`;
    });
    document.getElementById('memberSearch').addEventListener('input',filterMembers);

    document.getElementById('createUserForm').addEventListener('submit', async event => {
      event.preventDefault();
      const username=document.getElementById('username').value.trim();
      const password=document.getElementById('password').value;
      if(username.length<3){showStatus('กรุณากรอก User อย่างน้อย 3 ตัวอักษร','error');document.getElementById('username').focus();return;}
      if(password.length<8){showStatus(`Password ต้องมีอย่างน้อย 8 ตัวอักษร (ขณะนี้ ${password.length} ตัว)`,'error');document.getElementById('password').focus();return;}
      const button=event.submitter||event.target.querySelector('button[type="submit"]'); button.disabled=true; button.textContent='กำลังเพิ่ม...'; showStatus('กำลังสร้างสมาชิก...','success');
      try {
        const selected=selectedPermissions(document.getElementById('createPermissions'));
        const data=await invokeAdmin('create',{username,password,full_name:document.getElementById('fullName').value,role:document.getElementById('role').value,pages:selected.filter(key=>PAGE_KEYS.has(key))});
        const userId=data.user?.id;
        if(!userId) throw new Error('สร้างสมาชิกแล้วแต่ไม่พบ User ID สำหรับบันทึกสิทธิ์');
        const { error: permissionError }=await db.from('user_page_permissions').upsert(PERMISSIONS.map(([page_key])=>({user_id:userId,page_key,can_access:selected.includes(page_key)})),{onConflict:'user_id,page_key'});
        if(permissionError) {
          try { await invokeAdmin('delete',{user_id:userId}); } catch(rollbackError) { console.error('Rollback new user failed:',rollbackError); }
          throw permissionError;
        }
        showStatus(`เพิ่มสมาชิกสำเร็จ: ${data.user.email}`,'success'); event.target.reset(); document.getElementById('passwordCount').textContent='(0/8)'; toggleAllCreate(false); await loadMembers();
      } catch(error){showStatus(`เพิ่มสมาชิกไม่สำเร็จ: ${error.message}`,'error');} finally{button.disabled=false;button.textContent='เพิ่มสมาชิก';}
    });

    loadMembers();
  </script>
</body>
</html>
